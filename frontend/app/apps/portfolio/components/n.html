<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHU-COMFORT Use Case Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 1600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            color: #1e3c72;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #333;
        }

        .legend-symbol {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeIn 0.8s ease-out;
        }

        /* Actor styling */
        .actor {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .actor:hover .actor-box {
            fill: #7e22ce;
        }

        .actor:hover .actor-text {
            fill: white;
        }

        /* Use case styling */
        .usecase {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .usecase:hover ellipse {
            fill: #eff6ff;
            stroke-width: 2.5;
        }

        /* Connection lines */
        .connection {
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .usecase:hover ~ .connection,
        .actor:hover ~ .connection {
            opacity: 1;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
            }
        }
    </style>
</head>
